# On push to main: Lint → Test → build/push to GHCR → pull on EC2 & replace container
name: Deploy

on:
  push:
    branches: [main]

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

  # ── Job 2: Test ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build the app
        run: npm run build

      - name: Start the app in background
        run: npm start &

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000

      - name: Run tests
        run: npm test

  # ── Job 3: Build & Push to GHCR ─────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  # ── Job 4: Deploy to EC2 ───────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: SSH to EC2 and roll out image
        id: ec2_deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script_stop: true
          script: |
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop snapcart || true
            docker rm snapcart || true
            docker run -d --name snapcart -p 3000:3000 --restart unless-stopped ghcr.io/${{ github.repository }}:latest

      # POST JSON to Lambda (Function URL) from EC2 step outcome → CloudWatch logs
      - name: Notify Lambda of deployment result
        if: always()
        env:
          LAMBDA_URL: ${{ secrets.LAMBDA_URL }}
        run: |
          if [ "${{ steps.ec2_deploy.outcome }}" = "success" ]; then
            STATUS="success"
          else
            STATUS="failure"
          fi
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -sS -f -X POST "$LAMBDA_URL" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"${STATUS}\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\",\"repository\":\"${{ github.repository }}\",\"workflow\":\"${{ github.workflow }}\",\"run_id\":\"${{ github.run_id }}\",\"timestamp\":\"${TS}\"}"
